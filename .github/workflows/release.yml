name: release

# Build, sign, and publish the `maturana` binary for Linux + Windows on a version
# tag (e.g. `git tag v0.2.0 && git push --tags`). The installers download these
# prebuilt, signed artifacts so end users need no Rust/MSYS2/VS toolchain.
#
# Signing is opt-in via repository secrets; if they're absent the build still
# succeeds and ships UNSIGNED binaries (with SHA256SUMS):
#   WINDOWS_PFX_BASE64     base64 of an Authenticode code-signing .pfx
#   WINDOWS_PFX_PASSWORD   its password
#   GPG_PRIVATE_KEY        ASCII-armored private key to sign SHA256SUMS
#   GPG_PASSPHRASE         its passphrase

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: maturana-x86_64-unknown-linux-gnu.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: maturana-x86_64-pc-windows-msvc.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --target ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked -p maturana-cli --target ${{ matrix.target }}

      # --- Windows: Authenticode sign (opt-in) + zip ---
      - name: Sign + package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "target/${{ matrix.target }}/release/maturana.exe"
          if ($env:WINDOWS_PFX_BASE64) {
            $pfx = "$env:RUNNER_TEMP\cert.pfx"
            [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
            $st = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
                  Sort-Object FullName -Descending | Select-Object -First 1
            if (-not $st) { throw "signtool.exe not found on runner" }
            & $st.FullName sign /f $pfx /p $env:WINDOWS_PFX_PASSWORD /fd SHA256 `
              /tr http://timestamp.digicert.com /td SHA256 $exe
            Remove-Item $pfx -Force
            Write-Host "signed $exe"
          } else {
            Write-Host "WINDOWS_PFX_BASE64 not set - shipping UNSIGNED binary"
          }
          Compress-Archive -Path $exe -DestinationPath "${{ matrix.artifact }}" -Force
          (Get-FileHash "${{ matrix.artifact }}" -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.artifact }}" |
            Out-File -Encoding ascii "${{ matrix.artifact }}.sha256"
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}

      # --- Linux: tar.gz + sha256 ---
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -C "target/${{ matrix.target }}/release" -czf "${{ matrix.artifact }}" maturana
          sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combine checksums
        working-directory: dist
        run: cat *.sha256 > SHA256SUMS && rm -f *.sha256 && cat SHA256SUMS

      - name: GPG sign checksums (opt-in)
        working-directory: dist
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "GPG_PRIVATE_KEY not set - shipping unsigned SHA256SUMS"
            exit 0
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 0 --armor --detach-sign --output SHA256SUMS.asc SHA256SUMS

      - name: Publish release
        working-directory: dist
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" --generate-notes ./* \
            || gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber ./*
